# /etc/nginx/sites-available/snapduel
# Symlink to enable: ln -s /etc/nginx/sites-available/snapduel /etc/nginx/sites-enabled/snapduel

server {
    listen 80;
    listen [::]:80;
    server_name snapduel.wenqing.online;

    # certbot will replace this block with HTTPS redirect after: certbot --nginx -d snapduel.wenqing.online
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for Socket.IO WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Keep WebSocket connections alive
        proxy_read_timeout 86400;
    }
}
